  else if (condition==="flat") interp = I.flat;
  else if (condition==="dry") interp = I.dry;
  else if (desired==="texture") interp = I.texture;
  else if (desired==="hold") interp = I.hold;
  else if (desired==="natural") interp = I.natural;
  else if (desired==="volume") interp = I.volume;
  else interp = I.def;

  if (condition==="dry"||desired==="glossy") { pids.push(2); reasons.push(R.glossy); }
  if (condition==="curl-loss"||desired==="texture") { pids.push(1); reasons.push(R.curl); }
  if (condition==="flat"||desired==="volume") { pids.push(4); reasons.push(R.volume); }
  if (desired==="hold"&&length==="short") { pids.push(3); reasons.push(R.hold_short); }
  if (desired==="hold"&&!pids.includes(5)&&!pids.includes(6)) { pids.push(5); reasons.push(R.hold); }
  if (length==="short"&&condition==="dull"&&!pids.includes(3)) { pids.push(3); reasons.push(R.matte); }
  if (length==="long"&&(desired==="natural"||desired==="glossy")&&!pids.includes(7)) { pids.push(7); reasons.push(R.natural); }
  if (habit==="none") { pids=pids.slice(0,1); reasons=reasons.slice(0,1); }
  pids=pids.slice(0,3); reasons=reasons.slice(0,3);
  if (pids.length===0) { pids=[2]; reasons=[R.basic]; }

  const recProds = pids.map(id=>prods.find(p=>p.id===id)).filter(Boolean);
  const stepDescMap = (typeof STEP_DESC_BY_LANG !== 'undefined') ? (STEP_DESC_BY_LANG[lang] || STEP_DESC_BY_LANG.ko) : {};
  const steps = recProds.map((p,i)=>({step:i+1,product:p.name,action:stepDescMap[p.id]||"",img:p.img}));
  return { interp, pids, reasons, steps, recProds };
}

  const careData = CARE[lang] || CARE.ko;

  const openD = (p, s = null) => { setSel(p); setSTo(s); setMO(true); };
  const closeD = () => { setMO(false); setTimeout(() => { setSel(null); setSTo(null); }, 350); };

  useEffect(() => {
    if (mO && sTo && ref.current) setTimeout(() => {
      const el = ref.current.querySelector(`[data-s="${sTo}"]`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 400);
  }, [mO, sTo]);
  useEffect(() => { document.body.style.overflow = mO ? "hidden" : ""; return () => { document.body.style.overflow = ""; }; }, [mO]);

  const gn = (s) => s[lang] || s.ko;
  const selL = c => { setHiding(true); setTimeout(() => { setLang(c); setCat(null); setHiding(false); }, 400); };
  const goPage = (p) => { setPage(p); window.scrollTo(0,0); };
  const startDiag = () => { setDiagStep(0); setAnswers({}); setRecommendation(null); goPage("diagnosis"); };
  const handleDiagAnswer = (key, val) => {
    const na = {...answers, [key]:val};
    setAnswers(na);
    if (diagStep < questions.length-1) setTimeout(()=>setDiagStep(diagStep+1),250);
    else { const rec = getRecommendation(na, lang); setRecommendation(rec); setTimeout(()=>goPage("result"),300); }
  };
  const goRoutine = (pids) => { setRoutineProds(pids); goPage("routine"); };

  const bookLabel = lang === 'zh' ? '立即预约' : lang === 'ja' ? '予約する' : lang === 'en' ? 'Book Appointment' : '네이버 예약하기';
  const oilLabel = lang === 'zh' ? '购买抛光油' : lang === 'ja' ? 'オイル購入' : lang === 'en' ? 'Buy Polish Oil' : '폴리쉬오일 구매';
  const findLabel = lang === 'zh' ? '找到适合我的产品' : lang === 'ja' ? '私に合う製品を見つける' : lang === 'en' ? 'Find products for me' : '내 머리에 맞는 제품 찾기';
  const allProdsLabel = lang === 'zh' ? '查看全部产品' : lang === 'ja' ? '全製品を見る' : lang === 'en' ? 'View all products' : '전체 제품 보기';
  const routineTitle = lang === 'zh' ? '造型流程' : lang === 'ja' ? 'スタイリングルーティン' : lang === 'en' ? 'Styling Routine' : '스타일링 루틴';
  const routineSub = lang === 'zh' ? '今日推荐流程' : lang === 'ja' ? '今日のおすすめ' : lang === 'en' ? "Today's Routine" : '오늘의 추천 루틴';
  const careTitle = lang === 'zh' ? '护理指南' : lang === 'ja' ? 'ケアガイド' : lang === 'en' ? 'Care Guide' : '관리 가이드';
  const careSub = lang === 'zh' ? '烫发 · 染发 · 漂发' : lang === 'ja' ? 'パーマ · カラー · ブリーチ' : lang === 'en' ? 'Perm · Color · Bleach' : '펌 · 염색 · 탈색';
  const quoteText = lang === 'zh' ? '“比产品更重要的是,\n适合您发质的使用方法。”' : lang === 'ja' ? '“製品よりも大切なのは、\nあなたの髪に合う使い方です。”' : lang === 'en' ? '“What matters more than the product\nis how it suits your hair.”' : '“제품보다 중요한 건,\n내 머리에 맞는 사용법입니다.”';

  const Modal = () => (
    <div className={`mo ${mO?"o":""}`} onClick={closeD}>
      <div className="ms" ref={ref} onClick={e=>e.stopPropagation()}>
        {sel && <>
          <div className="mbar"><div className="mhdl"/><button className="mclb" onClick={closeD}><XI/></button></div>
          <div className="dtc">
            <div className="dimg">{sel.img?<img src={sel.img} alt={sel.name}/>:<div className="dimgp">{sel.name[0]}</div>}</div>
            <div className="dcat">{sel.brand}</div>
            <h2 className="dnam">{sel.name}</h2>
            <p className="dsht">{sel.short}</p>
            <div className="dsec"><div className="dstt">{t.feat}</div><div className="dfg">{sel.feat.map((f,i)=><span key={i} className="dfch">{f}</span>)}</div></div>
            <div className="dsec" data-s="rec"><div className="dstt">{t.rec}</div><div className="drc">{sel.rec.map((r,i)=><div key={i} className="dri"><span className="drd"/><span className="drt">{r}</span></div>)}</div></div>
            <div className="dsec" data-s="how"><div className="dstt">{t.how}</div><div className="dsl">{sel.how.map((s,i)=><div key={i} className="dsli"><span className="dsn">{i+1}</span><span className="dst">{s}</span></div>)}</div></div>
            <div className="dsec" data-s="tip"><div className="dstt">{t.tip}</div><div className="dtpc"><p className="dtpt">{sel.tip}</p></div></div>
            <div className="dsec"><div className="dstt">{t.caut}</div><div className="dcac"><div className="dcah"><CaI/><span className="dcal">{t.cautN}</span></div>{sel.caut.map((c2,i)=><div key={i} className="dcit"><span className="dcda">–</span><span className="dctx">{c2}</span></div>)}</div></div>
            <div className="ddm"><p className="ddmt">{t.dmD}</p><div className="ddmh"><a className="ddmc" href={staff.head.url} target="_blank" rel="noopener noreferrer">{gn(staff.head)} {staff.head.handle}</a>{staff.interns.map((s,i)=><a key={i} className="ddmc" href={s.url} target="_blank" rel="noopener noreferrer">{gn(s)} {s.handle}</a>)}</div></div>
          </div>
        </>}
      </div>
    </div>
  );

  const TopBar = ({title}) => (
    <div className="tbar">
      <button className="tback" onClick={()=>goPage("home")}><BkI/></button>
      <div className="ttitle">{title}</div>
    </div>
  );

  const LangBtn = () => {
    const labels = { ko:'한국어', en:'English', zh:'中文', ja:'日本語' };
    return <button className="lang-btn" onClick={()=>setLang(null)}><GlobeI/><span>{labels[lang]||'한국어'}</span></button>;
  };
  const BNav = ({act}) => {
    const items = [["home",ui.bnavHome,HomeI,()=>goPage("home")],["diag",ui.bnavDiag,SparkI,startDiag],["prod",ui.bnavProd,GridI,()=>goPage("products")],["rout",ui.bnavRout,ClockI,()=>goRoutine(routineProds||[2,1,7])],["care",ui.bnavCare,BookI,()=>goPage("care")]];
    return <div className="bnav">{items.map(([k,l,I,fn])=>(<button key={k} className={`bnav-item ${act===k?"act":""}`} onClick={fn}><I/><span>{l}</span></button>))}</div>;
  };

  const Booking = () => (
    <div className="booking">
      <a className="book-main" href={extraLinks.booking} target="_blank" rel="noopener noreferrer"><Cal/>{bookLabel}</a>
      <div className="book-sub">
        <a href={extraLinks.airua} target="_blank" rel="noopener noreferrer"><Bag/>{oilLabel}</a>
        <div className="wc"><Chat/>WeChat · {extraLinks.wechat}</div>
      </div>
    </div>
  );

  const FooterC = () => (
    <footer className="foot">
      <h3 className="foottitle">{t.dmT}</h3>
      <p className="footsub">{t.dmS}</p>
      <div className="footlbl">Director</div>
      <a className="fperson" href={staff.head.url} target="_blank" rel="noopener noreferrer">
        <div className="fpname">{staff.head.en.split('(')[0].trim()}</div>
        <div className="fphandle">{staff.head.handle}</div>
      </a>
      <div className="footlbl">Staff</div>
      {staff.interns.map((s,i)=>(
        <a key={i} className="fperson" href={s.url} target="_blank" rel="noopener noreferrer">
          <div className="fpname">{s.en}</div>
          <div className="fphandle">{s.handle}</div>
        </a>
      ))}
      <div className="footmark">DAY:MEAN</div>
    </footer>
  );

  /* PAGE: Language Splash */
  if (!lang) return (
    <><style>{css}</style>
    <div className={`lang-wrap ${hiding?"h":""}`}>
      <img className="lang-logo" src={LOGO_SRC} alt="DAY:MEAN"/>
      <div className="lang-t">언어를 선택해주세요</div>
      <div className="lang-ts">Select your language</div>
      <div className="lang-opts">
        {[["ko","한국어"],["en","English"],["zh","中文"],["ja","日本語"]].map(([c,l])=>(
          <button key={c} className="lang-b" onClick={()=>selL(c)}>{l}</button>
        ))}
      </div>
    </div></>
  );

  /* PAGE: Diagnosis */
  if (page === "diagnosis") {
    const qData = questions[diagStep];
    const progress = ((diagStep+1)/questions.length)*100;
    return (
      <><style>{css}</style>
      <div className="app">
      <LangBtn/>
        <TopBar title={ui.diagTitle}/>
        <div className="progress"><div className="progress-fill" style={{width:`${progress}%`}}/></div>
        <div className="diag-body" key={diagStep}>
          <div className="diag-qn rise">Q{diagStep+1} / {questions.length}</div>
          <div className="diag-qt rise" style={{animationDelay:'.05s'}}>{qData.title}</div>
          <div className="diag-qs rise" style={{animationDelay:'.1s'}}>{qData.sub}</div>
          <div className="diag-opts">
            {qData.opts.map((o,i)=>(
              <button key={o.v} className={`diag-opt rise ${answers[qData.key]===o.v?"sel":""}`} style={{animationDelay:`${.12+i*.04}s`}} onClick={()=>handleDiagAnswer(qData.key,o.v)}>
                <span>{o.l}</span><span className="diag-opt-arrow">→</span>
              </button>
            ))}
          </div>
        </div>
      </div></>
    );
  }

  /* PAGE: Result */
  if (page === "result" && recommendation) {
    const { interp, pids, reasons, recProds } = recommendation;
    const steps = recProds.map((p,i)=>({step:i+1,product:p,action:stepDesc[p.id]||"스타일링",detail:stepDetail[p.id]||""}));
    return (
      <><style>{css}</style>
      <div className="app">
      <LangBtn/>
        <TopBar title={ui.resultTitle}/>
        <div className="res-interp rise">
          <div className="res-il">{ui.resInterpLabel}</div>
          <div className="res-it">{interp}</div>
        </div>
        <div className="rsec">
          <div className="rsec-h"><span>{ui.resSecRecProd}</span></div>
          {recProds.map((p,i)=>(
            <div key={p.id} className="rprod" onClick={()=>openD(p)}>
              <div className="rthumb"><img src={p.img} alt={p.name}/></div>
              <div className="rbody"><div className="rbrand">{p.brand}</div><div className="rname">{p.name}</div><div className="rreason">{reasons[i]}</div></div>
              <div className="rarrow">→</div>
            </div>
          ))}
        </div>
        <div className="rsec">
          <div className="rsec-h"><span>{ui.resSecSteps}</span></div>
          {steps.map((s,i)=>(
            <div key={i} className="rstep">
              <div className="rstep-l"><div className="rsnum">{s.step}</div>{i<steps.length-1 && <div className="rsline"/>}</div>
              <div className="rstep-card" onClick={()=>openD(s.product)}><div className="rs-name">{s.product.name}</div><div className="rs-act">{s.action}</div><div className="rs-detail">{s.detail}</div></div>
            </div>
          ))}
        </div>
        <div className="rsec">
          <div className="rsec-h"><span>{ui.resSecTip}</span></div>
          <div className="rcard"><p>{ui.resStaticTip1}</p><p>{ui.resStaticTip2}</p></div>
        </div>
        <div className="rsec">
          <div className="rsec-h"><span>{ui.resSecCaut}</span></div>
          <div className="rcard"><p>{ui.resStaticCaut1}</p><p>{ui.resStaticCaut2}</p></div>
        </div>
        <div className="ractions">
          <button className="r-cta" onClick={()=>goRoutine(pids)}>{ui.ctaStartRoutine}</button>
          <button className="r-cta2" onClick={()=>goPage("products")}>{allProdsLabel}</button>
        </div>
        <Modal/>
      </div></>
    );
  }

  /* PAGE: Routine */
  if (page === "routine") {
    const rpids = routineProds || [2,1,7];
    const rProds = rpids.map(id=>koProds.find(p=>p.id===id)).filter(Boolean);
    return (
      <><style>{css}</style>
      <div className="app">
      <LangBtn/>
        <TopBar title={ui.routinePageTitle}/>
        <div className="rout-title-area">
          <div className="rout-label">{ui.routineTopLabel}</div>
          <div className="rout-title rise">{ui.routineMainTitle}</div>
          <div className="rout-sub rise" style={{animationDelay:'.05s'}}>{ui.routineSubText}</div>
        </div>
        <div className="rsec">
          {rProds.map((p,i)=>(
            <div key={p.id} className="rstep rise" style={{animationDelay:`${.1+i*.06}s`}}>
              <div className="rstep-l"><div className="rsnum">{i+1}</div>{i<rProds.length-1 && <div className="rsline"/>}</div>
              <div className="rstep-card" onClick={()=>openD(p)}><div className="rs-name">{p.name}</div><div className="rs-act">{stepDesc[p.id]||"스타일링"}</div><div className="rs-detail">{stepDetail[p.id]||""}</div></div>
            </div>
          ))}
        </div>
        <div className="rsec">
          <div className="rcard"><p style={{whiteSpace:"pre-line"}}>{ui.routineTipText}</p></div>
        </div>
        <Modal/>
        <BNav act="rout"/>
      </div></>
    );
  }

  /* PAGE: Care */
  if (page === "care") {
    const guide = careData[careTab];
    const careProds = guide.prods.map(id=>(P[lang]||P.ko).find(p=>p.id===id)).filter(Boolean);
    return (
      <><style>{css}</style>
      <div className="app">
      <LangBtn/>
        <TopBar title={ui.carePageTitle}/>
        <div className="care-title">{ui.carePageTopTitle}</div>
        <div className="care-tabs">
          {Object.entries(careData).map(([key,g])=>(
            <button key={key} className={`care-tab ${careTab===key?"a":""}`} onClick={()=>setCareTab(key)}>{g.emoji} {g.title}</button>
          ))}
        </div>
        <div key={careTab}>
          <div className="care-sec-title rise">{guide.title}</div>
          <div className="care-sec-sub rise" style={{animationDelay:'.05s'}}>{guide.sub}</div>
          <div className="rsec"><div className="rsec-h"><span>{ui.careSecMethod}</span></div></div>
          <div className="care-list">
            {guide.tips.map((tip,i)=>(
              <div key={i} className="care-tip rise" style={{animationDelay:`${.1+i*.04}s`}}>
                <div className="care-tip-num">{i+1}</div>
                <div className="care-tip-t">{tip}</div>
              </div>
            ))}
          </div>
          <div className="rsec"><div className="rsec-h"><span>{ui.resSecCaut}</span></div></div>
          <div className="care-warn">
            <div className="care-warn-h"><CaI/><span className="care-warn-l">{ui.careWarnLabel}</span></div>
            {guide.cauts.map((c,i)=><p key={i}>– {c}</p>)}
          </div>
          <div className="rsec"><div className="rsec-h"><span>{ui.resSecRecProd}</span></div>
            {careProds.map(p=>(
              <div key={p.id} className="rprod" onClick={()=>openD(p)}>
                <div className="rthumb"><img src={p.img} alt={p.name}/></div>
                <div className="rbody"><div className="rbrand">{p.brand}</div><div className="rname">{p.name}</div><div className="rreason">{p.short}</div></div>
                <div className="rarrow">→</div>
              </div>
            ))}
          </div>
        </div>
        <Modal/>
        <BNav act="care"/>
      </div></>
    );
  }

  /* PAGE: Products */
  if (page === "products") return (
    <><style>{css}</style>
    <div className="app">
      <LangBtn/>
      <header className="hero">
        <img className="herologo" src={LOGO_SRC} alt="DAY:MEAN"/>
        <div className="hdesc">Styling Guide</div>
        <p className="hsub">{t.heroSub}</p>
      </header>
      <div className="searchwrap">
        <div className="search">
          <SI/>
          <input type="text" placeholder={t.search} value={q} onChange={e=>setQ(e.target.value)}/>
          {q && <button className="sclear" onClick={()=>setQ("")}><XI/></button>}
        </div>
      </div>
      <div className="filters">
        {cats.map(c2 => {
          const n = c2===allL ? prods.length : prods.filter(p=>p.cat===c2).length;
          return <button key={c2} className={`fitem ${curC===c2?"on":""}`} onClick={()=>setCat(c2)}>{c2}<span className="fcount">{n}</span></button>;
        })}
      </div>
      {fil.length===0
        ? <div className="nores">{t.noR}</div>
        : <div className="grid">
            {fil.map((p,i)=>(
              <div key={p.id} className="pc rise" style={{animationDelay:`${i*55}ms`}} onClick={()=>openD(p)}>
                {p.img ? <img className="pphoto" src={p.img} alt={p.name}/> : <div className="pphoto-ph">{p.name[0]}</div>}
                <div className="pinfo">
                  <div className="pbrand">{p.brand}</div>
                  <div className="pname">{p.name}</div>
                  <div className="plinks">
                    <button className="plink" onClick={e=>{e.stopPropagation();openD(p,"rec")}}>{t.rec}</button>
                    <button className="plink" onClick={e=>{e.stopPropagation();openD(p,"how")}}>{t.how}</button>
                    <button className="plink" onClick={e=>{e.stopPropagation();openD(p,"tip")}}>{t.tip}</button>
                  </div>
                </div>
              </div>
            ))}
          </div>}
      <Booking/>
      <FooterC/>
      <Modal/>
      <button className="bkb" onClick={()=>{setCat(null);setQ("");goPage("home")}}><BkI/></button>
      <BNav act="prod"/>
    </div></>
  );

  /* PAGE: Home (default) */
  return (
    <><style>{css}</style>
    <div className="app">
      <LangBtn/>
      <header className="hero">
        <img className="herologo" src={LOGO_SRC} alt="DAY:MEAN"/>
        <div className="hdesc">Styling Guide</div>
        <p className="hsub">{t.heroSub}</p>
      </header>
      <div className="home-cta">
        <button className="h-primary" onClick={startDiag}><Spark/>{findLabel}</button>
        <button className="h-secondary" onClick={()=>goPage("products")}>{allProdsLabel}</button>
      </div>
      <div className="home-cards">
        <div className="home-card" onClick={()=>goRoutine([2,1,7])}>
          <div className="home-card-emoji">✨</div>
          <div><div className="home-card-t">{routineTitle}</div><div className="home-card-s">{routineSub}</div></div>
        </div>
        <div className="home-card" onClick={()=>goPage("care")}>
          <div className="home-card-emoji">📖</div>
          <div><div className="home-card-t">{careTitle}</div><div className="home-card-s">{careSub}</div></div>
        </div>
      </div>
      <div className="home-quote"><p>{quoteText}</p></div>
      <Booking/>
      <FooterC/>
      <BNav act="home"/>
    </div></>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
