  if (habit==="none") { pids=pids.slice(0,1); reasons=reasons.slice(0,1); }
  pids=pids.slice(0,3); reasons=reasons.slice(0,3);
  if (pids.length===0) { pids=[2]; reasons=[R.basic]; }

  const recProds = pids.map(id=>prods.find(p=>p.id===id)).filter(Boolean);
  const stepDescMap = (typeof STEP_DESC_BY_LANG !== 'undefined') ? (STEP_DESC_BY_LANG[lang] || STEP_DESC_BY_LANG.ko) : {};
  const steps = recProds.map((p,i)=>({step:i+1,product:p.name,action:stepDescMap[p.id]||"",img:p.img}));
  return { interp, pids, reasons, steps, recProds };
}

/* Home Instagram Section */
.home-insta{margin:24px 16px 0}

.home-insta-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:18px 8px 16px;border-radius:14px;
  background:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);

.home-insta-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF);color:#fff;margin-bottom:5px;
  box-shadow:0 4px 12px rgba(221,42,123,.22)}
.home-insta-name{font-size:12px;font-weight:500;color:var(--ink);letter-spacing:-.1px}
.home-insta-handle{font-family:var(--fd);font-size:9px;letter-spacing:.5px;color:var(--ink3);word-break:break-all;line-height:1.2}

/* FAQ Page */
.faq-wrap{padding:6px 16px 110px;display:flex;flex-direction:column;gap:8px}
.faq-item{background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:14px;overflow:hidden;box-shadow:0 6px 16px rgba(20,20,45,.05),inset 0 1px 0 rgba(255,255,255,.95);transition:all .25s ease}
.faq-item.open{background:rgba(255,255,255,.78);box-shadow:0 10px 22px rgba(20,20,45,.08),inset 0 1px 0 rgba(255,255,255,.95)}
.faq-q{display:flex;align-items:center;gap:10px;width:100%;padding:15px 16px;background:none;border:none;font-family:inherit;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent}
.faq-q-num{flex-shrink:0;font-family:var(--fd);font-size:10px;letter-spacing:1.5px;color:var(--ink3);font-weight:500;width:28px}
.faq-q-text{flex:1;font-size:13px;color:var(--ink);line-height:1.4;font-weight:500;letter-spacing:-.1px}
.faq-q-icon{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink3);transition:transform .25s}
.faq-item.open .faq-q-icon{color:var(--ink)}
.faq-a{padding:0 16px 16px 54px;font-size:12.5px;color:var(--ink2);line-height:1.65;word-break:keep-all;animation:rise .25s var(--ease)}
.faq-cta{margin-top:14px;padding:18px 16px;border-radius:16px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);text-align:center}
.faq-cta-text{font-size:12.5px;color:var(--ink2);line-height:1.55;word-break:keep-all;margin-bottom:12px}
.faq-cta-btns{display:flex;gap:8px}
.faq-cta-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px 8px;border-radius:11px;font-size:11.5px;font-weight:500;text-decoration:none;-webkit-tap-highlight-color:transparent;transition:transform .2s ease}
.faq-cta-btn:active{transform:scale(.97)}
.faq-cta-kakao{background:rgba(255,255,255,.7);color:var(--ink2);border:1px solid rgba(0,0,0,.05)}
.faq-cta-kakao svg{color:#E5B800}
.faq-cta-dm{background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF);color:#fff;border:none;box-shadow:0 4px 12px rgba(221,42,123,.25)}
.book-info-row .bk-text{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px;line-height:1;text-align:left}
.book-info-row .bk-main{font-size:12px;letter-spacing:.2px;font-weight:500;line-height:1.15;color:var(--ink)}
.book-info-row .bk-hint{font-size:10px;letter-spacing:.3px;color:var(--ink3);line-height:1.1}
.book-info-row .info-arrow{font-size:14px;color:var(--ink3);margin-left:auto;flex-shrink:0}

/* Info Page */
.info-wrap{padding:6px 16px 100px}
.info-hero{text-align:center;padding:18px 0 24px}
.info-name{font-family:var(--fd);font-size:30px;font-weight:600;letter-spacing:2.5px;color:var(--ink)}
.info-sub{font-size:12px;color:var(--ink3);margin-top:6px;letter-spacing:.5px}
.info-card{background:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-radius:18px;padding:6px 4px;box-shadow:0 10px 28px rgba(20,20,45,.07),inset 0 1px 0 rgba(255,255,255,.95)}
.info-row{display:flex;align-items:flex-start;gap:14px;padding:16px 14px}
.info-row-sep{border-top:1px solid rgba(0,0,0,.05)}
.info-ic-l{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(0,0,0,.04);color:var(--ink2)}
.info-body{flex:1;min-width:0}
.info-lbl{font-family:var(--fd);font-size:9.5px;letter-spacing:1.5px;color:var(--ink3);text-transform:uppercase;margin-bottom:4px}
.info-val{font-size:13.5px;color:var(--ink);line-height:1.45;word-break:keep-all}
.info-val-sub{font-size:11px;color:var(--ink3);margin-top:3px;line-height:1.4;word-break:keep-all}
.info-link{text-decoration:none;color:var(--ink)}
.info-mini{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:7px 10px;border-radius:9px;
  background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.05);font-size:10.5px;color:var(--ink2);text-decoration:none;
  cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .2s ease;align-self:flex-start;margin-top:2px}
.info-mini:active{transform:scale(.96)}
.info-mini.ok{background:rgba(26,127,55,.92);color:#fff;border-color:rgba(26,127,55,.95)}
.info-maps{display:flex;gap:10px;margin-top:14px}
.info-map-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 10px;border-radius:13px;
  font-size:12px;font-weight:500;text-decoration:none;-webkit-tap-highlight-color:transparent;transition:transform .2s ease;
  box-shadow:0 6px 16px rgba(20,20,45,.08)}
.info-map-btn:active{transform:scale(.98)}
.info-map-btn.naver{background:#03C75A;color:#fff;border:1px solid rgba(0,0,0,.05)}
.info-map-btn.google{background:#1A73E8;color:#fff;border:1px solid rgba(0,0,0,.05)}
.info-map-embed{margin:0 0 16px;border-radius:16px;overflow:hidden;background:#ECECEF;
  box-shadow:0 8px 22px rgba(20,20,45,.08);aspect-ratio:16/10;border:1px solid rgba(255,255,255,.95)}
.info-map-embed iframe{width:100%;height:100%;border:0;display:block}

/* Menu Page */
.menu-tabs{position:sticky;top:0;z-index:5;display:flex;gap:6px;padding:8px 12px 10px;overflow-x:auto;background:linear-gradient(180deg,rgba(236,236,239,1) 60%,rgba(236,236,239,.85) 100%);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.menu-tabs::-webkit-scrollbar{display:none}
.menu-tab{flex-shrink:0;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.9);font-family:inherit;font-size:12.5px;color:var(--ink2);letter-spacing:.2px;cursor:pointer;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 4px 12px rgba(20,20,45,.05);-webkit-tap-highlight-color:transparent;transition:all .2s ease}
.menu-tab.act{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:500}
.menu-tab:active{transform:scale(.96)}

.menu-wrap{padding:6px 16px 110px;display:flex;flex-direction:column;gap:12px}
.menu-card{background:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:18px;padding:18px 18px 16px;box-shadow:0 10px 26px rgba(20,20,45,.07),inset 0 1px 0 rgba(255,255,255,.95)}
.menu-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.menu-card-name-wrap{flex:1;min-width:0}
.menu-card-name{font-size:15.5px;font-weight:500;color:var(--ink);letter-spacing:-.1px;line-height:1.35}
.menu-card-name-ko{font-size:11px;color:var(--ink3);margin-top:3px;line-height:1.3}
.menu-badge{flex-shrink:0;padding:5px 9px;border-radius:8px;background:#E0362B;color:#fff;font-size:10.5px;font-weight:500;letter-spacing:.3px}
.menu-card-desc{font-size:12.5px;color:var(--ink2);line-height:1.55;margin-top:8px;word-break:keep-all}
.menu-by-length{margin-top:13px;padding:10px 12px;background:rgba(0,0,0,.025);border-radius:11px}
.menu-bl-label{font-family:var(--fd);font-size:9.5px;letter-spacing:1.4px;color:var(--ink3);text-transform:uppercase;margin-bottom:6px}
.menu-bl-list{display:flex;flex-direction:column;gap:5px}
.menu-bl-row{display:flex;align-items:baseline;justify-content:space-between;font-size:12.5px}
.menu-bl-l{color:var(--ink2)}
.menu-bl-p{color:var(--ink);font-feature-settings:"tnum";font-variant-numeric:tabular-nums}
.menu-card-price{margin-top:13px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.menu-was{font-size:12.5px;color:var(--ink3);text-decoration:line-through;font-feature-settings:"tnum"}
.menu-price{font-size:18px;font-weight:600;color:var(--ink);letter-spacing:-.3px;font-feature-settings:"tnum"}
.menu-notes{margin-top:12px;padding-top:11px;border-top:1px dashed rgba(0,0,0,.07)}
.menu-notes-label{font-family:var(--fd);font-size:9.5px;letter-spacing:1.4px;color:var(--ink3);text-transform:uppercase;margin-bottom:5px}
.menu-notes ul{margin:0;padding-left:14px;list-style:disc;color:var(--ink3);font-size:11.5px;line-height:1.6}
.menu-disclaimer{margin-top:6px;font-size:11px;color:var(--ink3);line-height:1.5;text-align:center;padding:8px 4px}
.menu-cta{margin-top:8px}
.menu-cta .book-main{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;padding:18px;background:var(--ink);color:#fff;
  font-family:var(--fd);font-size:13px;letter-spacing:2px;font-weight:500;text-transform:uppercase;border:none;border-radius:13px;text-decoration:none;
  box-shadow:0 12px 28px rgba(20,20,40,.22);cursor:pointer;-webkit-tap-highlight-color:transparent}

/* Footer */
.foot{margin:22px 16px 14px;padding:32px 24px 26px;border-radius:18px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);text-align:center;box-shadow:0 12px 30px rgba(20,20,45,.08),inset 0 1px 0 rgba(255,255,255,.9)}
.foottitle{font-family:var(--fd);font-size:20px;font-weight:500;color:var(--ink);letter-spacing:2px;text-transform:uppercase}
.footsub{font-size:11px;color:var(--ink2);line-height:1.8;margin-top:8px;white-space:pre-line;word-break:keep-all}
.footlbl{font-family:var(--fd);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--ink3);margin-top:20px;margin-bottom:6px}
.fperson{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line2);text-decoration:none;-webkit-tap-highlight-color:transparent;cursor:pointer;transition:opacity .15s}
.fperson:active{opacity:.7}
.fperson:last-of-type{border-bottom:none}
.fperson > div:first-child{flex:1;min-width:0;text-align:left}
.fpname{font-size:12px;color:var(--ink)}
.fdm-badge{flex-shrink:0;font-family:var(--fd);font-size:9.5px;letter-spacing:1.5px;padding:5px 10px;border-radius:8px;
  background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF);color:#fff;font-weight:500;
  box-shadow:0 3px 10px rgba(221,42,123,.25)}
.fphandle{font-family:var(--fd);font-size:10px;color:var(--ink3);margin-top:2px}
.footmark{font-family:var(--fd);font-size:32px;font-weight:600;letter-spacing:1.5px;color:var(--ink3);margin-top:22px;opacity:.5}

/* Bottom nav (fixed) */
.bnav{position:fixed;bottom:max(8px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:calc(min(430px,100%) - 24px);z-index:80;
  display:flex;justify-content:space-around;align-items:center;padding:9px 6px;border-radius:18px;
  background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.9);backdrop-filter:blur(22px) saturate(1.6);-webkit-backdrop-filter:blur(22px) saturate(1.6);
  box-shadow:0 10px 28px rgba(20,20,45,.14),inset 0 1px 0 rgba(255,255,255,.95)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;background:none;border:none;cursor:pointer;
  color:var(--ink3);font-family:var(--fd);font-size:9.5px;letter-spacing:1px;font-weight:500;text-transform:uppercase;border-radius:11px;-webkit-tap-highlight-color:transparent}
.bnav-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.6}
.bnav-item.act{color:var(--ink)}.bnav-item.act svg{stroke-width:2}

/* Back button (lang reset) */
.bkb{position:fixed;top:max(12px,env(safe-area-inset-top));left:12px;z-index:90;width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);box-shadow:0 4px 14px rgba(20,20,45,.1);-webkit-tap-highlight-color:transparent}

/* Search */
.searchwrap{position:sticky;top:0;z-index:30;padding:11px 16px;background:rgba(236,236,239,.66);
  backdrop-filter:blur(26px) saturate(1.7);-webkit-backdrop-filter:blur(26px) saturate(1.7);border-bottom:1px solid rgba(255,255,255,.6)}
.search{display:flex;align-items:center;gap:11px;padding:13px 14px;border-radius:12px;
  background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.9);box-shadow:0 4px 14px rgba(20,20,45,.06),inset 0 1px 0 rgba(255,255,255,.9)}
.si{width:16px;height:16px;color:var(--ink3);flex-shrink:0}
.search input{flex:1;border:none;outline:none;background:none;font-family:var(--fb);font-size:14px;color:var(--ink)}
.search input::placeholder{color:var(--ink3)}
.sclear{background:none;border:none;cursor:pointer;color:var(--ink3);display:flex;padding:2px;-webkit-tap-highlight-color:transparent}

/* Filters */
.filters{display:flex;gap:7px;overflow-x:auto;padding:14px 16px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fitem{white-space:nowrap;font-family:var(--fd);font-size:12px;letter-spacing:.5px;color:var(--ink2);
  background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.9);border-radius:9px;padding:9px 14px;cursor:pointer;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all .22s var(--ease);box-shadow:0 2px 9px rgba(20,20,45,.05);-webkit-tap-highlight-color:transparent}
.fitem.on{color:#fff;background:var(--ink);border-color:var(--ink);box-shadow:0 5px 14px rgba(20,20,40,.25)}
.fcount{font-size:9.5px;margin-left:5px;opacity:.55}

/* Product grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:18px 16px 0}
.pc{position:relative;height:248px;border-radius:17px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;
  box-shadow:0 12px 26px rgba(25,25,55,.17);border:1px solid rgba(255,255,255,.5)}
.pphoto{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 36%;display:block;background:#fff}
.pphoto-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#e2e2e6,#d2d2d8);font-family:var(--fd);font-size:34px;color:#fff}
.pinfo{position:absolute;left:7px;right:7px;bottom:7px;padding:11px 12px 10px;border-radius:12px;
  background:rgba(255,255,255,.56);backdrop-filter:blur(20px) saturate(1.8) brightness(1.12);-webkit-backdrop-filter:blur(20px) saturate(1.8) brightness(1.12);
  border:1px solid rgba(255,255,255,.82);box-shadow:0 6px 18px rgba(20,20,45,.17),inset 0 1px 0 rgba(255,255,255,.95)}
.pbrand{font-family:var(--fd);font-size:9px;letter-spacing:1.8px;font-weight:600;color:var(--ink3)}
.pname{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.34;margin-top:3px;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.plinks{display:flex;margin-top:9px;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.plink{flex:1;font-family:var(--fb);font-size:9px;color:var(--ink2);padding:6px 1px;text-align:center;white-space:nowrap;background:transparent;border:none;border-right:1px solid var(--line);cursor:pointer;-webkit-tap-highlight-color:transparent}
.plink:last-child{border-right:none}

/* No result */
.nores{text-align:center;padding:56px 26px;font-size:12.5px;font-weight:400;color:var(--ink3);line-height:1.9;white-space:pre-line}

/* Diagnosis */
.progress{height:3px;margin:6px 24px 0;background:rgba(20,20,30,.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--ink);border-radius:3px;transition:width .45s var(--ease)}
.diag-body{padding:30px 26px 30px}
.diag-qn{font-family:var(--fd);font-size:11px;letter-spacing:2.6px;font-weight:500;color:var(--ink3);margin-bottom:14px}
.diag-qt{font-size:23px;font-weight:600;color:var(--ink);line-height:1.32;letter-spacing:-.3px;margin-bottom:8px;word-break:keep-all}
.diag-qs{font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:24px;word-break:keep-all}
.diag-opts{display:flex;flex-direction:column;gap:9px}
.diag-opt{display:flex;align-items:center;justify-content:space-between;padding:17px 18px;border-radius:13px;
  background:rgba(255,255,255,.56);border:1px solid rgba(255,255,255,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 5px 16px rgba(20,20,45,.07),inset 0 1px 0 rgba(255,255,255,.9);
  font-family:var(--fb);font-size:14.5px;font-weight:500;color:var(--ink);text-align:left;width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .22s var(--ease)}
.diag-opt-arrow{opacity:.35;font-size:14px;font-weight:300}
.diag-opt.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
.diag-opt.sel .diag-opt-arrow{opacity:1}

/* Result / shared sections */
.res-interp{margin:18px 16px 0;padding:24px 22px;border-radius:18px;background:rgba(255,255,255,.58);border:1px solid rgba(255,255,255,.9);
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);box-shadow:0 12px 30px rgba(20,20,45,.1),inset 0 1px 0 rgba(255,255,255,.95)}
.res-il{font-family:var(--fd);font-size:10px;letter-spacing:2.6px;text-transform:uppercase;font-weight:600;
  background:var(--chrome);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:10px;display:inline-block}
.res-it{font-size:15px;font-weight:500;color:var(--ink);line-height:1.6;word-break:keep-all}
.rsec{margin:24px 16px 0}
.rsec-h{font-family:var(--fd);font-size:11px;letter-spacing:2.4px;text-transform:uppercase;color:var(--ink2);font-weight:500;margin-bottom:12px;padding:0 4px;display:flex;align-items:baseline;gap:10px}
.rsec-h::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.rprod{display:flex;gap:13px;padding:12px;margin-bottom:8px;align-items:center;background:rgba(255,255,255,.56);border:1px solid rgba(255,255,255,.9);border-radius:14px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 6px 18px rgba(20,20,45,.08),inset 0 1px 0 rgba(255,255,255,.95);cursor:pointer;-webkit-tap-highlight-color:transparent}
.rthumb{width:62px;height:78px;border-radius:9px;overflow:hidden;flex-shrink:0;background:#fff;border:1px solid rgba(255,255,255,.7)}

/* App */
const App = function App() {
  const [lang, setLang] = useState(null);
  const [hiding, setHiding] = useState(false);
  const [page, setPage] = useState("home");
  const [cat, setCat] = useState(null);
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(null);
  const [mO, setMO] = useState(false);
  const [sTo, setSTo] = useState(null);
  const ref = useRef(null);
  const [diagStep, setDiagStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [recommendation, setRecommendation] = useState(null);
  const [routineProds, setRoutineProds] = useState(null);
  const [careTab, setCareTab] = useState("perm");
  const [menuCat, setMenuCat] = useState("set");
  const [faqOpenIdx, setFaqOpenIdx] = useState(null);
  const [langOpen, setLangOpen] = useState(false);
  const [savedDiag, setSavedDiag] = useState(null);

  /* localStorage: 진단 결과 복원 (마운트 시 1회) */
  useEffect(() => {
    try {
      const raw = localStorage.getItem('daymean_diag');
      if (!raw) return;
      const data = JSON.parse(raw);
      const MAX_AGE = 30 * 24 * 60 * 60 * 1000; // 30일
      if (!data.ts || (Date.now() - data.ts) > MAX_AGE) {
        localStorage.removeItem('daymean_diag');
        return;
      }
      if (data.answers && Object.keys(data.answers).length >= 5) {
        setSavedDiag(data);
      }
    } catch (_) {}
  }, []);

  const resumeDiag = () => {
    if (!savedDiag) return;
    const restoreLang = savedDiag.lang || 'ko';
    if (!lang) { setLang(restoreLang); setHiding(false); }
    setAnswers(savedDiag.answers);
    const rec = getRecommendation(savedDiag.answers, restoreLang);
    setRecommendation(rec);
    goPage('result');
    if (window.track) window.track('diagnosis_resume', { lang: restoreLang });
  };

  /* GA4 — 외부 링크 클릭 자동 트래킹 */
  useEffect(() => {
    if (!window.track) return;
    const handler = (e) => {
      const a = e.target.closest('a[href]');
      if (!a) return;
      const href = a.href;
      if (href.startsWith('tel:')) { window.track('phone_click', { lang }); return; }
      if (!href.startsWith('http')) return;
      if (href.includes('localhost') || href.includes('dminternational.github.io')) return;
      const cls = (a.className && typeof a.className === 'string') ? a.className : '';
      let name = 'outbound_click';
      if (cls.includes('book-main')) name = 'booking_naver_click';
      else if (cls.includes('bk-kakao')) name = 'kakao_channel_click';
      else if (cls.includes('about-cta-btn') || cls.includes('fperson') || cls.includes('faq-cta-dm')) name = 'instagram_dm_click';
      else if (cls.includes('home-insta-card')) name = 'instagram_profile_click';
      else if (cls.includes('info-map-btn')) name = href.includes('google') ? 'google_map_click' : 'naver_map_click';
      else if (cls.includes('book-sub2')) name = 'polish_oil_click';
      window.track(name, { url: href, lang: lang || 'unset' });

  /* PAGE: Routine */
  if (page === "routine") {

      <><style>{css}</style>

        <div className="rsec">

            <div key={p.id} className="rstep rise" style={{animationDelay:`${.1+i*.06}s`}}>

      <div className="app">
      <LangBtn/>

        <div key={careTab}>
          <div className="care-sec-title rise">{guide.title}</div>
          <div className="care-sec-sub rise" style={{animationDelay:'.05s'}}>{guide.sub}</div>
          <div className="rsec"><div className="rsec-h"><span>{ui.careSecMethod}</span></div></div>
          <div className="care-list">
            {guide.tips.map((tip,i)=>(

        <LangBtn/>
        <TopBar title={ui.menuTitle}/>

                    {it.byLength.map((b,j) => (
                      <div key={j} className="menu-bl-row">

                  <div className="menu-notes">
                    <div className="menu-notes-label">{notesLabel}</div>
                    <ul>{arr.map((n,j) => <li key={j}>{n}</li>)}</ul>

          <div className="menu-cta">
            <a className="book-main" href={extraLinks.booking} target="_blank" rel="noopener noreferrer"><Cal/>{bookLabel}</a>
          </div>
        </div>
        <BNav act=""/>
      </div></>

  }

  /* PAGE: Info */
  if (page === "info") {
    return (
      <><style>{css}</style>
      <div className="app">
        <LangBtn/>
        <TopBar title={ui.infoTitle}/>
        <div className="info-wrap">
          <div className="info-hero rise">
            <div className="info-name">{storeInfo.name}</div>
            <div className="info-sub">{lang==='ko' ? '데이민' : lang==='zh' ? '黛美恩' : lang==='ja' ? 'デイミーン' : 'Day:Mean Salon'}</div>
          </div>

          <div className="info-map-embed rise" style={{animationDelay:'.04s'}}>
            <iframe
              title="Map"
              loading="lazy"
              referrerPolicy="no-referrer-when-downgrade"
              src="https://maps.google.com/maps?q=%EC%84%9C%EC%9A%B8%20%EB%A7%88%ED%8F%AC%EA%B5%AC%20%EC%96%91%ED%99%94%EB%A1%9C12%EA%B8%B8%2016-9&t=&z=17&ie=UTF8&iwloc=&output=embed"
              allowFullScreen
            />
          </div>

          <div className="info-card rise" style={{animationDelay:'.05s'}}>
            <div className="info-row">
              <span className="info-ic-l"><Pin/></span>
              <div className="info-body">
                <div className="info-lbl">{addressLabel}</div>
                <div className="info-val">{storeInfo.addressKo}</div>
                {lang !== 'ko' && <div className="info-val-sub">{storeInfo.addressEn}</div>}
              </div>
              <button className={`info-mini ${addrCopied?'ok':''}`} type="button" onClick={copyAddress}>
                {addrCopied ? <Check/> : <Copy/>}
                <span>{addrCopied ? addrCopiedLabel : copyAddrLabel}</span>
              </button>
            </div>

            <div className="info-row info-row-sep">
              <span className="info-ic-l"><PhoneI/></span>
              <div className="info-body">
                <div className="info-lbl">{phoneLabel}</div>
                <a href={`tel:${storeInfo.phone.replace(/[^0-9]/g,'')}`} className="info-val info-link">{storeInfo.phone}</a>
              </div>
              <a href={`tel:${storeInfo.phone.replace(/[^0-9]/g,'')}`} className="info-mini">
                <PhoneI/><span>{callLabel}</span>
              </a>
            </div>

            <div className="info-row info-row-sep">
              <span className="info-ic-l"><Clock/></span>
              <div className="info-body">
                <div className="info-lbl">{hoursLabel}</div>
                <div className="info-val">{storeInfo.closedDays[lang] || storeInfo.closedDays.ko}</div>
                <div className="info-val-sub">{sectionHoursDetail}</div>
              </div>
            </div>

            <div className="info-row info-row-sep">
              <span className="info-ic-l"><Train/></span>
              <div className="info-body">
                <div className="info-lbl">{transitLabel}</div>
                <div className="info-val">{storeInfo.transit[lang] || storeInfo.transit.ko}</div>
              </div>
            </div>
          </div>

          <div className="info-maps rise" style={{animationDelay:'.1s'}}>
            <a className="info-map-btn naver" href={extraLinks.naverMap} target="_blank" rel="noopener noreferrer">
              <MapI/><span>{naverMapLabel}</span>
            </a>
            <a className="info-map-btn google" href={extraLinks.googleMap} target="_blank" rel="noopener noreferrer">
              <MapI/><span>{googleMapLabel}</span>
            </a>
          </div>
        </div>
        <BNav act=""/>
      </div></>
    );
  }

  /* PAGE: Products */
  if (page === "products") return (
    <><style>{css}</style>
    <div className="app">
      <LangBtn/>
      <header className="hero">
        <img className="herologo" src={LOGO_SRC} alt="DAY:MEAN"/>
        <div className="hdesc">Styling Guide</div>
        <p className="hsub">{t.heroSub}</p>
      </header>
      <div className="searchwrap">
        <div className="search">
          <SI/>
          <input type="text" placeholder={t.search} value={q} onChange={e=>setQ(e.target.value)}/>
          {q && <button className="sclear" onClick={()=>setQ("")}><XI/></button>}
        </div>
      </div>
      <div className="filters">
        {cats.map(c2 => {
          const n = c2===allL ? prods.length : prods.filter(p=>p.cat===c2).length;
          return <button key={c2} className={`fitem ${curC===c2?"on":""}`} onClick={()=>setCat(c2)}>{c2}<span className="fcount">{n}</span></button>;
        })}
      </div>
      {fil.length===0
        ? <div className="nores">{t.noR}</div>
        : <div className="grid">
            {fil.map((p,i)=>(
              <div key={p.id} className="pc rise" style={{animationDelay:`${i*55}ms`}} onClick={()=>openD(p)}>
                {p.img ? <img className="pphoto" src={p.img} alt={p.name}/> : <div className="pphoto-ph">{p.name[0]}</div>}
                <div className="pinfo">
                  <div className="pbrand">{p.brand}</div>
                  <div className="pname">{p.name}</div>
                  <div className="plinks">
                    <button className="plink" onClick={e=>{e.stopPropagation();openD(p,"rec")}}>{t.rec}</button>
                    <button className="plink" onClick={e=>{e.stopPropagation();openD(p,"how")}}>{t.how}</button>
                    <button className="plink" onClick={e=>{e.stopPropagation();openD(p,"tip")}}>{t.tip}</button>
                  </div>
                </div>
              </div>
            ))}
          </div>}
      <Booking/>
      <FooterC/>
      <Modal/>
      <button className="bkb" onClick={()=>{setCat(null);setQ("");goPage("home")}}><BkI/></button>
      <BNav act="prod"/>
    </div></>
  );

  /* PAGE: Home (default) */
  return (
    <><style>{css}</style>
    <div className="app">
      <LangBtn/>
      <header className="hero">
        <img className="herologo" src={LOGO_SRC} alt="DAY:MEAN"/>
        <div className="hdesc">Styling Guide</div>
        <p className="hsub">{t.heroSub}</p>
      </header>
      {savedDiag && (
        <div className="home-resume rise">
          <button className="resume-main" type="button" onClick={resumeDiag}>
            <span className="resume-ic"><Check/></span>
            <span className="resume-text">
              <span className="resume-t">{lang==='zh'?'查看上次诊断结果':lang==='ja'?'前回の診断結果を見る':lang==='en'?'View my last result':'내 진단 결과 다시 보기'}</span>
              <span className="resume-s">{lang==='zh'?'已保存':lang==='ja'?'保存済み':lang==='en'?'saved on this device':'이 기기에 저장됨'}</span>
            </span>
            <span className="resume-arr">→</span>
          </button>
          <button className="resume-x" type="button" aria-label="dismiss" onClick={(e)=>{e.stopPropagation();clearDiag();}}>×</button>
        </div>
      )}
      <div className="home-cta">
        <button className="h-primary" onClick={startDiag}><Spark/>{findLabel}</button>
        <button className="h-secondary" onClick={()=>goPage("products")}>{allProdsLabel}</button>
      </div>
      <div className="home-cards">
        <div className="home-card" onClick={()=>goRoutine([2,1,7])}>
          <div className="home-card-emoji">✨</div>

        </div>
        <div className="home-card" onClick={()=>goPage("care")}>
          <div className="home-card-emoji">📖</div>
          <div><div className="home-card-t">{careTitle}</div><div className="home-card-s">{careSub}</div></div>
        </div>
      </div>
      <div className="home-quote"><p>{quoteText}</p></div>
      <Booking/>
      <section className="home-insta">
        <div className="home-insta-lbl">INSTAGRAM</div>
        <div className="home-insta-grid">
          {[staff.head, ...staff.interns].map((s, i) => (
            <a key={i} className="home-insta-card" href={s.url} target="_blank" rel="noopener noreferrer">
              <div className="home-insta-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor"/></svg>
              </div>
              <div className="home-insta-name">{s.en ? s.en.split('(')[0].trim() : s[lang]}</div>
              <div className="home-insta-handle">{s.handle}</div>
            </a>
          ))}
        </div>
      </section>
      <FooterC/>
      <BNav act="home"/>
    </div></>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('[DAY:MEAN]', error, info); }
  reset = () => { this.setState({ error: null }); };
  reload = () => { window.location.reload(); };
  render() {
    if (!this.state.error) return this.props.children;
    return (
      <div style={{
        position:'fixed', inset:0, display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center', padding:'24px',
        background:'linear-gradient(180deg,#F2F2F4,#E6E6EA)',
        fontFamily:"-apple-system,BlinkMacSystemFont,'Helvetica Neue','Apple SD Gothic Neo',sans-serif",
        color:'#1C1C26', textAlign:'center'
      }}>
        <div style={{fontSize:'40px',marginBottom:'14px'}}>⚠️</div>
        <div style={{fontSize:'17px',fontWeight:600,marginBottom:'8px',letterSpacing:'-.2px'}}>일시적인 오류가 발생했어요</div>
        <div style={{fontSize:'12.5px',color:'#888',lineHeight:1.6,marginBottom:'24px',maxWidth:'280px',wordBreak:'keep-all'}}>
          문제가 계속되면 카카오 채널이나 인스타 DM으로 알려주세요.<br/>
          <span style={{fontSize:'10px',color:'#aaa'}}>A temporary error occurred. Please try again.</span>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={this.reset} style={{padding:'12px 22px',borderRadius:'12px',background:'rgba(255,255,255,.7)',border:'1px solid rgba(0,0,0,.05)',fontSize:'13px',cursor:'pointer',color:'#1C1C26',backdropFilter:'blur(14px)',WebkitBackdropFilter:'blur(14px)'}}>다시 시도</button>
          <button onClick={this.reload} style={{padding:'12px 22px',borderRadius:'12px',background:'#1C1C26',border:'none',fontSize:'13px',color:'#fff',cursor:'pointer',fontWeight:500}}>새로고침</button>
        </div>
      </div>
    );
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
